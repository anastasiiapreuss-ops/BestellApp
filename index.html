<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="impressum.css">
    <link rel="stylesheet" href="headercontent.css">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="globalstyle.css">
    <title>BestellApp</title>
</head>

<body onload="init()">

    <header>
        <div class="left-footer-side">
            <img src="./assets/icons/takeout_dining_2.png" alt="BestellApp icon">
            <p>Bestell<br><span class="app_text_style">APP</span></p>
        </div>
        <img class="menu_header_icon" src="./assets/icons/dehaze.png" alt="menu icon">
    </header>

    <main>
        <section class="main_style">
            <img class="claude-monet-img-style" src="./assets/img/claude-monter-background-img.webp"
                alt="Claude Monet Restaurant">

            <img class="claude-monet-icon" src="./assets/icons/claude-monet-icon.webp" alt="claude-monet-icon">

            <section class="main_text_style">
                <section class="top_text_style">
                    <h1>CLAUDE MONET</h1>

                    <p class="evaluation_style">
                        <img src="./assets/icons/star.png" alt="star-icon">
                        <span class="five_style">5,0</span><span class="bracket_style">(10.570)</span>
                    </p>
                </section>

                <p class="restaurant_p">
                    Sterne-gekrönte französische Kochkunst,
                    die Tradition und moderne Raffinesse perfekt vereint
                </p>
            </section>
        </section>

        <section class="our_menu_style">
            <div class="menu_icon_p_style">
                <img src="./assets/icons/icons8-restaurant-menü-100.png" alt="our-menu-icon">
                <h2>UNSER MENÜ</h2>
            </div>
        </section>

        <section class="content_style">

            <section id="menu">


            </section>

            <aside id="shopping-cart" class="shopping_cart_style">
                <button onclick="mobileShoppingCart()" class="close_cart_button">x
                </button>
                <h2>Ihr Warenkorb</h2>

                <section id="shopping-cart-content">

                </section>
                <section class="sum_style">
                    <p class="total_style"><span>Zwischensumme:</span> <span id="sub-total-price">0,00 €</span></p>
                    <p class="total_style" id="delivery">Lieferkosten: <span>10,99 €</span></p>
                    <hr>
                    <p class="total_style" id="sum-total">
                        <span class="sum_p_style">Gesamtbetrag:</span>
                        <span id="total-price">0,00 €</span>
                    </p>
                </section>
                <button onclick="buyNow()" id="total-price-button" class="buy_button">Jetzt bezahlen (0,00€)</button>
            </aside>

        </section>
        <dialog id="dialog-input">

        </dialog>
        <section class="nav_bar_style">
            <button class="nav_button"><img src="./assets/icons/home (1).svg" alt="Home Icon"></button>
            <button class="nav_button"><img src="./assets/icons/person.svg" alt="Person Icon"></button>
            <button class="nav_button"><img src="./assets/icons/takeout_dining_2.png" alt="BestellApp Icon"></button>
            <button onclick="mobileShoppingCart()" class="nav_button"><img id="cart-button"
                    src="./assets/icons/shopping_cart (1).svg" alt="Warenkorb Icon"><span id="cart-amount"
                    class="cart_badge">0</span></button>
        </section>

    </main>

    <footer>
        <section class="left_footer-side">
            <img src="./assets/icons/icons8-copyright-emoji-48.png" alt="copright-icon">
            <p>2026 CLAUDE MONET</p>
        </section>

        <a href="./impressum.html">Imprint</a>
        <p>Cookie Preferences</p>
    </footer>

</body>
<script src="tempalte.js"></script>
<script src="script.js"></script>

</html>
